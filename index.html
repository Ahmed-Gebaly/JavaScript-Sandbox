<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables & Operators Practice</title>
</head>
<body>
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h2>JavaScript Variables & Operators Examples</h2>
        <p>Open DevTools (F12) → Console to see the output</p>
    </div>
    <!-- ====== HTML ELEMENTS FOR OUTPUT ====== -->
    <div  style="border: 1px solid black; padding: 10px; margin: 10px;">
        <div id="output"></div>
        <hr>
        <div id="dom-output"></div>
    </div>
    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div id="output-lab" style="border: 1px solid black; padding: 10px; margin: 10px;"></div>

    <!-- ====== HTML INPUT ELEMENT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <p id="greeting">Hello World</p>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button id="submitBtn">Submit</button>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== --> 
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <input type="text" id="textInput" placeholder="Enter Text">
        <button id="submitTextBtn">Submit</button>
        <div id="textOutput"></div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <input type="number" id="weightInput" placeholder="Enter your Weight (kg)">
        <input type="number" id="heightInput" placeholder="Enter your Height (m)">
        <button id="submitNumBtn">Submit</button>
        <div id="numOutput"></div>
    </div>

    <!-- ====== EXTERNAL JAVASCRIPT FILE ====== -->
    <script src="script.js"></script>
</body>
</html>
