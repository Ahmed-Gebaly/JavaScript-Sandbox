<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables & Operators Practice</title>
</head>
<body>
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h2>JavaScript Variables & Operators Examples</h2>
        <p>Open DevTools (F12) → Console to see the output</p>
    </div>
    <!-- ====== HTML ELEMENTS FOR OUTPUT ====== -->
    <div  style="border: 1px solid black; padding: 10px; margin: 10px;">
        <div id="output"></div>
        <hr>
        <div id="dom-output"></div>
    </div>
    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div id="output-lab" style="border: 1px solid black; padding: 10px; margin: 10px;"></div>

    <!-- ====== HTML INPUT ELEMENT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <p id="greeting">Hello World</p>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button id="submitBtn">Submit</button>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== --> 
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <input type="text" id="textInput" placeholder="Enter Text">
        <button id="submitTextBtn">Submit</button>
        <div id="textOutput"></div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <input type="number" id="weightInput" placeholder="Enter your Weight (kg)">
        <input type="number" id="heightInput" placeholder="Enter your Height (m)">
        <button id="submitNumBtn">Submit</button>
        <div id="numOutput"></div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <input type="text" id ="arrayInput" placeholder="Enter Array Values (comma separated)">
        <button id="submitArrayBtn">Submit</button>
        <button id="deleteArrayBtn">Delete</button>
        <div id="arrayOutputContainer">
            <p id="arrayOutput"></p>
            <p id="arrayLengthOutput"></p>
        </div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Multiplication Table of 10 </h3>
        <p id="incrementOutput"></p>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Vowel Letters (A, E, I, O, U)</h3>
        <input type="text" id="wordInput" placeholder="Enter a Word">
        <button id="submitWordBtn">Submit</button>
        <div id="wordOutput"></div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Find Student (For Loop) </h3>
        <input type="text" id="studentNameInput" placeholder="Enter Student Name">
        <button id="searchBtn">Search</button>
        <p id="studentList"></p>
        <p id="searchOutput"></p>
    </div>
    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Find Student (While Loop) </h3>
        <input type="text" id="studentNameInput2" placeholder="Enter Student Name">
        <button id="searchBtn2">Search</button>
        <p id="studentList2"></p>
        <p id="searchOutput2"></p>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Multiplication Table </h3>
        <div id="tableOutput"></div>
    </div>

    <!-- ====== LAB EXERCISES OUTPUT ====== -->
    <div style="border: 1px solid black; padding: 10px; margin: 10px;">
        <h3> Reverse Array Function </h3>
        <div id="reverseArrayOutput"></div>
    </div>

<!--  -->
    <!-- ====== EXTERNAL JAVASCRIPT FILE ====== -->
    <script src="script.js"></script>
</body>
</html>
